name: IndexNow ping (Bing + Yandex)

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**'

jobs:
  ping-indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 90

      - name: Fetch sitemap and submit URLs to IndexNow
        run: |
          SITEMAP="https://fieldservicestack.com/sitemap-index.xml"
          KEY="64b7dc3983a5ecdf1efb79813172cf00"
          HOST="fieldservicestack.com"

          curl --fail --silent --show-error "$SITEMAP" | grep -oE '<loc>[^<]+</loc>' | sed -E 's|</?loc>||g' > /tmp/sub.txt

          if grep -q 'sitemap' /tmp/sub.txt; then
            while read -r SUBSITE; do
              curl --fail --silent --show-error "$SUBSITE" | grep -oE '<loc>[^<]+</loc>' | sed -E 's|</?loc>||g' >> /tmp/urls.txt
            done < /tmp/sub.txt
          else
            cat /tmp/sub.txt > /tmp/urls.txt
          fi

          URLS_JSON=$(jq -R -s -c 'split("\n") | map(select(. != ""))' /tmp/urls.txt)
          PAYLOAD=$(jq -n --arg host "$HOST" --arg key "$KEY" --argjson urls "$URLS_JSON" '{host: $host, key: $key, keyLocation: ("https://" + $host + "/" + $key + ".txt"), urlList: $urls}')

          echo "Submitting $(echo "$URLS_JSON" | jq 'length') URLs to IndexNow"
          HTTP_CODE=$(curl --silent --show-error --output /tmp/indexnow-response.txt --write-out '%{http_code}' -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")
          cat /tmp/indexnow-response.txt
          echo "HTTP $HTTP_CODE"
          case "$HTTP_CODE" in
            200|202) ;;
            *) exit 1 ;;
          esac
